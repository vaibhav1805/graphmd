name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release (e.g., v2.0.0)'
        required: true

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            output_name: semanticmesh-darwin-arm64
          - goos: darwin
            goarch: amd64
            output_name: semanticmesh-darwin-amd64
          - goos: linux
            goarch: amd64
            output_name: semanticmesh-linux-amd64
          - goos: linux
            goarch: arm64
            output_name: semanticmesh-linux-arm64
          - goos: windows
            goarch: amd64
            output_name: semanticmesh-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p releases
          go build -ldflags="-s -w" -o releases/${{ matrix.output_name }} ./cmd/semanticmesh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: releases/${{ matrix.output_name }}

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

  create-release:
    name: Create Release
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find all-binaries -type f -name "semanticmesh-*" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/semanticmesh-*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
